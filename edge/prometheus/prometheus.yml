global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: traefik
    static_configs:
      - targets: ["traefik:8082"]

  - job_name: headscale
    static_configs:
      - targets: ["headscale:9090"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
