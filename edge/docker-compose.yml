# Viseu AI Lab · edge stack
# Traefik (reverse proxy, TLS) + headscale (WireGuard mesh control plane + DERP)
# Deployed to the edge host by iac/ansible (playbooks/edge.yml).

name: viseu-edge

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    environment:
      # Docker Engine 29 raised the minimum API version above the default
      # pinned by older Traefik releases; keep the explicit override too.
      DOCKER_API_VERSION: "1.44"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge

  headscale:
    image: headscale/headscale:0.26
    restart: unless-stopped
    command: serve
    ports:
      - "3478:3478/udp" # STUN for the embedded DERP relay
    volumes:
      - ./headscale:/etc/headscale:ro
      - headscale-data:/var/lib/headscale
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mesh.rule=Host(`mesh.viseuai.org`)"
      - "traefik.http.routers.mesh.entrypoints=websecure"
      - "traefik.http.routers.mesh.tls.certresolver=le"
      - "traefik.http.services.mesh.loadbalancer.server.port=8080"

  website:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - /opt/viseu/website:/usr/share/nginx/html:ro
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.website.rule=Host(`viseuai.org`)"
      - "traefik.http.routers.website.entrypoints=websecure"
      - "traefik.http.routers.website.tls.certresolver=le"
      - "traefik.http.services.website.loadbalancer.server.port=80"

  gateway:
    image: viseuai/gateway:dev
    # built on the host from the gateway repo (CI → registry is a follow-up)
    pull_policy: never
    restart: unless-stopped
    environment:
      OIDC_ISSUER: https://auth.viseuai.org/realms/viseu
      UPSTREAM_URL: http://llamacpp:8081
      # model=url,... map enabling the router; empty → single upstream
      BACKENDS: ${GATEWAY_BACKENDS:-}
      DATABASE_URL: postgres://gateway:${GATEWAY_DB_PASSWORD}@postgres:5432/gateway?sslmode=disable
      QUOTA_DAILY_REQUESTS: "500"
      QUOTA_MONTHLY_TOKENS: "2000000"
      CORS_ORIGINS: https://chat.viseuai.org,https://platform.viseuai.org
      KC_ADMIN_CLIENT_SECRET: ${KC_ADMIN_CLIENT_SECRET:-}
      HEADSCALE_API_KEY: ${HEADSCALE_API_KEY:-}
    depends_on:
      llamacpp:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.viseuai.org`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  llamacpp:
    # "node zero": tiny CPU model on the edge host itself, so the platform
    # has a real open-weight backend before the first mesh node exists.
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    command: >-
      -m /models/qwen2.5-0.5b-instruct-q4_k_m.gguf
      --alias qwen2.5-0.5b-instruct
      --host 0.0.0.0 --port 8081
      -c 2048 --threads 2
    volumes:
      - /opt/viseu/models:/models:ro
    networks:
      - edge
    # internal only: reachable through the gateway, never published

  chat:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - /opt/viseu/chat:/usr/share/nginx/html:ro
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.chat.rule=Host(`chat.viseuai.org`)"
      - "traefik.http.routers.chat.entrypoints=websecure"
      - "traefik.http.routers.chat.tls.certresolver=le"
      - "traefik.http.services.chat.loadbalancer.server.port=80"

  console:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - /opt/viseu/console:/usr/share/nginx/html:ro
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.console.rule=Host(`platform.viseuai.org`)"
      - "traefik.http.routers.console.entrypoints=websecure"
      - "traefik.http.routers.console.tls.certresolver=le"
      - "traefik.http.services.console.loadbalancer.server.port=80"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: viseu
      POSTGRES_DB: viseu
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - edge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viseu"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    restart: unless-stopped
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: https://auth.viseuai.org
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.viseuai.org`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=le"
      - "traefik.http.services.auth.loadbalancer.server.port=8080"

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom-data:/prometheus
    networks:
      - edge
    # internal only: no published ports, no traefik labels

  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - edge
    # internal only: reach via SSH tunnel / mesh; public exposure deliberate later

networks:
  edge:
    name: viseu-edge

volumes:
  traefik-letsencrypt:
  headscale-data:
  pg-data:
  prom-data:
  grafana-data:
