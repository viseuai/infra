# Viseu AI Lab · edge stack
# Traefik (reverse proxy, TLS) + headscale (WireGuard mesh control plane + DERP)
# Deployed to the edge host by iac/ansible (playbooks/edge.yml).

name: viseu-edge

services:
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    environment:
      # Docker Engine 29 raised the minimum API version above the default
      # pinned by older Traefik releases; keep the explicit override too.
      DOCKER_API_VERSION: "1.44"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik-letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - edge

  headscale:
    image: headscale/headscale:0.26
    restart: unless-stopped
    command: serve
    ports:
      - "3478:3478/udp" # STUN for the embedded DERP relay
    volumes:
      - ./headscale:/etc/headscale:ro
      - headscale-data:/var/lib/headscale
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mesh.rule=Host(`mesh.viseuai.org`)"
      - "traefik.http.routers.mesh.entrypoints=websecure"
      - "traefik.http.routers.mesh.tls.certresolver=le"
      - "traefik.http.services.mesh.loadbalancer.server.port=8080"

  website:
    image: nginx:stable-alpine
    restart: unless-stopped
    volumes:
      - /opt/viseu/website:/usr/share/nginx/html:ro
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.website.rule=Host(`viseuai.org`)"
      - "traefik.http.routers.website.entrypoints=websecure"
      - "traefik.http.routers.website.tls.certresolver=le"
      - "traefik.http.services.website.loadbalancer.server.port=80"

networks:
  edge:
    name: viseu-edge

volumes:
  traefik-letsencrypt:
  headscale-data:
